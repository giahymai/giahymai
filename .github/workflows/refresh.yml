name: Refresh profile

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      - 'profile-summary-card-output/**'

permissions:
  contents: write

concurrency:
  group: refresh-profile
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Stats cards -> commit images into main (no auto-push; we batch later)
      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 2
          AUTO_PUSH: false

      # 2) Update README dynamic sections + draw assets/sky.svg + fetch NASA APOD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README, sky & APOD
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}   # optional; falls back to DEMO_KEY
        run: python3 scripts/update_readme.py

      # 3) One commit, one push (with retry handled by the action)
      - name: Commit & push everything
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile [skip ci]"
          branch: main
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  snake:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
